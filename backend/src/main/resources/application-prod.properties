# =========================
# SERVER
# =========================
server.port=${PORT:8080}

# =========================
# DATABASE (Cloud DB)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

user.profile.image.path=images/users/
product.image.path=images/products/

# =========================
# FRONTEND
# =========================
app.cors.front-end-url=${FRONTEND_URL}
app.auth.frontend.success-redirect=${FRONTEND_URL}/auth/success
app.auth.frontend.failure-redirect=${FRONTEND_URL}/auth/failure

# =========================
# JWT
# =========================
security.jwt.secret=${JWT_SECRET}
security.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
security.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:604800}
security.jwt.issuer=com.ecom.salezone

# =========================
# COOKIE (PROD ? Secure)
# =========================
security.jwt.refresh-token-cookie-name=refreshToken
security.jwt.cookie-http-only=true
security.jwt.cookie-secure=true
security.jwt.cookie-same-site=none
security.jwt.cookie-domain=${COOKIE_DOMAIN}

# =========================
# GOOGLE OAUTH
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email,openid